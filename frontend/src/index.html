<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrainShop</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="hero">
    <p class="badge">Projet DevOps B3</p>
    <h1>TrainShop</h1>
    <p>Projet complet avec Docker, GitHub Actions, PostgreSQL, Redis, Nginx et monitoring.</p>
    <button id="reload">Recharger</button>
  </header>

  <main>
    <section class="card">
      <h2>État API</h2>
      <pre id="health">Chargement...</pre>
    </section>

    <section>
      <h2>Produits</h2>
      <div id="products" class="grid"></div>
    </section>

    <section class="card">
      <h2>Créer une commande de test</h2>
      <button id="create-order">Créer une commande</button>
      <pre id="order-result"></pre>
    </section>
  </main>

  <footer>TrainShop — Support pédagogique DevOps</footer>
  <script src="/app.js"></script>
</body>
</html>
