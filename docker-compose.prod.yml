services:
  proxy:
    image: nginx:1.27-alpine
    container_name: trainshop_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - frontend_net
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: trainshop_frontend
    networks:
      - frontend_net
    restart: unless-stopped

  api:
    image: ${API_IMAGE}
    container_name: trainshop_api
    env_file:
      - .env
    environment:
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    container_name: trainshop_db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trainshop_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  frontend_net:
  backend_net:
    internal: true
